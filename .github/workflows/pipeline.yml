# This is a basic workflow to help you get started with Actions

name: Raju-demo-workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" , "raju1" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  pre_check:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Check for Python Version
        run: |
          python3 --version

  sast:
    name: SAST - CodeQL
    needs: pre_check
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: Python
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: /home/runner/work/_temp/codeql_databases/
          retention-days: 7  # Keep for 1 week instead of 90 days


  dast:
    name: DAST Analysis (OWASP ZAP)
    needs: sast
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write                                  # ← fixes "Resource not accessible" error
      security-events: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install flask

      - name: Start Flask App (for scanning)
        run: |
          source venv/bin/activate
          nohup python app.py &
          sleep 5
        env:
          FLASK_ENV: testing

      - name: Fix Permissions for ZAP
        run: chmod 777 ${{ github.workspace }}

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "https://www.google.com"
          fail_action: false
          issue_title: "ZAP DAST Scan Report"        # ← creates GitHub issue with results
          artifact_name: zap-results

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-html-report
          path: report_html.html


  app_build:
    runs-on: self-hosted
    needs: dast
    if: always()
    environment:
      name: production
    

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: Check Python Version
        run:  python3 --version 

      - name: Run Flask App
        run: |
          python3 -m venv venv
          source venv/bin/activate 
          pip install flask 
          python app.py &
