name: Simple CI/CD (SAST + DAST + Deploy)

on:
  push:
    branches: [ "main" ]

jobs:

# ---------------------------
# 1. SAST (CodeQL)
# ---------------------------
  sast:
    name: SAST - CodeQL
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Init CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: /home/runner/work/_temp/codeql_databases
          retention-days: 7


# ---------------------------
# 2. DAST (OWASP ZAP)
# ---------------------------
  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: sast

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install flask

      - name: Start Flask App
        run: |
          source venv/bin/activate
          nohup python app.py &
          sleep 5

      - name: Run ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://127.0.0.1:5000"
          fail_action: false

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: report_html.html
          retention-days: 7


# ---------------------------
# 3. Deploy
# ---------------------------
  deploy:
    name: Deploy App
    runs-on: self-hosted
    needs: dast

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Restart App
        run: |
          pm2 delete flask-app || true
          pm2 start app.py --name flask-app --interpreter venv/bin/python
          pm2 save
